name: Deploy backend + frontend

on:
  workflow_dispatch:
    inputs:
      package_agents:
        description: "Docker-package all five agent Lambdas before terraform apply"
        required: true
        type: boolean
        default: true
      reuse_existing_agent_infra:
        description: "Reuse IAM role."
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  CI: true
  TF_VAR_aws_region: ${{ secrets.ALEX_AWS_REGION }}
  TF_VAR_aurora_cluster_arn: ${{ secrets.ALEX_AURORA_CLUSTER_ARN }}
  TF_VAR_aurora_secret_arn: ${{ secrets.ALEX_AURORA_SECRET_ARN != '' && secrets.ALEX_AURORA_SECRET_ARN || secrets.AURORA_SECRET_ARN }}
  TF_VAR_vector_bucket: ${{ secrets.ALEX_VECTOR_BUCKET != '' && secrets.ALEX_VECTOR_BUCKET || secrets.VECTOR_BUCKET }}
  TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
  TF_VAR_polygon_api_key: ${{ secrets.ALEX_POLYGON_API_KEY }}
  TF_VAR_polygon_plan: ${{ secrets.POLYGON_PLAN != '' && secrets.POLYGON_PLAN || 'free' }}
  TF_VAR_clerk_jwks_url: ${{ secrets.ALEX_CLERK_JWKS_URL }}
  TF_VAR_clerk_issuer: ${{ secrets.ALEX_CLERK_ISSUER }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Alex ai Agents
    runs-on: ubuntu-latest
    env:
      TF_VAR_reuse_existing_agent_infrastructure: ${{ inputs.reuse_existing_agent_infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.ALEX_AWS_REGION }}

      - name: Enable Docker BuildKit (Lambda packaging)
        run: echo "DOCKER_BUILDKIT=1" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Print AWS identity
        run: aws sts get-caller-identity

      - name: Sync backend workspace
        working-directory: backend
        run: uv sync

      - name: Debug commit and database main.tf snippet
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_REF=${GITHUB_REF}"
          sed -n '55,80p' terraform/5_database/main.tf

      # Step 1: Deploy the database infrastructure
      - name: Deploy database infrastructure
        working-directory: terraform/5_database
        run: |
          set -euo pipefail
          terraform init -input=false
          # Local state is not persisted in CI. Align state with AWS before apply:
          # - Already in state → skip (nothing to do)
          # - In AWS but not in state → import (avoids AlreadyExists on apply)
          # - Not in AWS → skip import; apply will create

          import_if_needed() {
            local addr="$1"
            local aws_id="$2"
            local describe_cmd="$3"

            if terraform state show -no-color "$addr" >/dev/null 2>&1; then
              echo "$addr already in Terraform state; skip import."
              return 0
            fi
            if ! eval "$describe_cmd"; then
              echo "$addr not found in AWS; Terraform apply will create it."
              return 0
            fi
            local out
            set +e
            out="$(terraform import -input=false "$addr" "$aws_id" 2>&1)"
            local ec=$?
            set -e
            if [ "$ec" -eq 0 ]; then
              echo "$out"
              return 0
            fi
            if [[ "$out" == *"Cannot import non-existent remote object"* ]]; then
              echo "$addr missing in AWS at import time; Terraform apply will create it."
              return 0
            fi
            if [[ "$out" == *"Resource already managed by Terraform"* ]] || [[ "$out" == *"already in state"* ]]; then
              echo "$addr already tracked; continuing."
              return 0
            fi
            echo "$out"
            return "$ec"
          }

          import_if_needed aws_db_subnet_group.aurora alex-aurora-subnet-group \
            'aws rds describe-db-subnet-groups --db-subnet-group-name alex-aurora-subnet-group >/dev/null 2>&1'

          import_if_needed aws_iam_role.lambda_aurora_role alex-lambda-aurora-role \
            'aws iam get-role --role-name alex-lambda-aurora-role >/dev/null 2>&1'

          # Cluster before instance (instance references cluster).
          import_if_needed aws_rds_cluster.aurora alex-aurora-cluster \
            'aws rds describe-db-clusters --db-cluster-identifier alex-aurora-cluster >/dev/null 2>&1'

          import_if_needed aws_rds_cluster_instance.aurora alex-aurora-instance-1 \
            'aws rds describe-db-instances --db-instance-identifier alex-aurora-instance-1 >/dev/null 2>&1'

          echo "Current Terraform state entries:"
          terraform state list || true

          if aws rds describe-db-subnet-groups --db-subnet-group-name alex-aurora-subnet-group >/dev/null 2>&1; then
            terraform state list | grep -Fx 'aws_db_subnet_group.aurora' >/dev/null || {
              echo "DB subnet group exists in AWS but is not in Terraform state after import."
              exit 1
            }
          fi

          if aws iam get-role --role-name alex-lambda-aurora-role >/dev/null 2>&1; then
            terraform state list | grep -Fx 'aws_iam_role.lambda_aurora_role' >/dev/null || {
              echo "IAM role exists in AWS but is not in Terraform state after import."
              exit 1
            }
          fi

          if aws rds describe-db-clusters --db-cluster-identifier alex-aurora-cluster >/dev/null 2>&1; then
            terraform state list | grep -Fx 'aws_rds_cluster.aurora' >/dev/null || {
              echo "RDS cluster exists in AWS but is not in Terraform state after import."
              exit 1
            }
          fi

          if aws rds describe-db-instances --db-instance-identifier alex-aurora-instance-1 >/dev/null 2>&1; then
            terraform state list | grep -Fx 'aws_rds_cluster_instance.aurora' >/dev/null || {
              echo "RDS instance exists in AWS but is not in Terraform state after import."
              exit 1
            }
          fi

          terraform apply -auto-approve

      # Step 2: Deploy the 6_agents infrastructure
      - name: Terraform init (6_agents)
        working-directory: terraform/6_agents
        run: terraform init -input=false

      - name: Import existing resources (if necessary)
        working-directory: terraform/6_agents
        run: |
          # Import the existing Lambda event source mapping
          terraform import aws_lambda_event_source_mapping.planner_sqs fee018d8-0872-44e2-a4d3-1ea3d57aa0f7 || echo "Resource already imported or does not exist"

      - name: Terraform apply (6_agents)
        working-directory: terraform/6_agents
        run: terraform apply -auto-approve

      - name: Package (optional) and deploy agent Lambdas
        working-directory: backend
        run: |
          # Avoid inheriting backend/.venv as VIRTUAL_ENV when each agent uses its own .venv
          unset VIRTUAL_ENV
          if [ "${{ inputs.package_agents }}" = "true" ]; then
            uv run deploy_all_lambdas.py --package
          else
            uv run deploy_all_lambdas.py
          fi

      - name: Sync backend API project (package_docker for API Lambda)
        working-directory: backend/api
        run: uv sync

      - name: Write frontend
        working-directory: frontend
        env:
          PK: ${{ secrets.ALEX_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          SK: ${{ secrets.ALEX_CLERK_SECRET_KEY }}
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${PK}
          CLERK_SECRET_KEY=${SK}
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
          EOF

      - name: Run full deployment
        working-directory: scripts
        run: uv run deploy.py
