name: Deploy backend + frontend

on:
  workflow_dispatch:
    inputs:
      package_agents:
        description: "Docker-package all five agent Lambdas before terraform apply"
        required: true
        type: boolean
        default: true
      reuse_existing_agent_infra:
        description: "Reuse IAM role."
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  CI: true
  TF_VAR_aws_region: ${{ secrets.ALEX_AWS_REGION }}
  TF_VAR_aurora_cluster_arn: ${{ secrets.ALEX_AURORA_CLUSTER_ARN }}
  TF_VAR_aurora_secret_arn: ${{ secrets.ALEX_AURORA_SECRET_ARN != '' && secrets.ALEX_AURORA_SECRET_ARN || secrets.AURORA_SECRET_ARN }}
  TF_VAR_vector_bucket: ${{ secrets.ALEX_VECTOR_BUCKET != '' && secrets.ALEX_VECTOR_BUCKET || secrets.VECTOR_BUCKET }}
  TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
  TF_VAR_polygon_api_key: ${{ secrets.ALEX_POLYGON_API_KEY }}
  TF_VAR_polygon_plan: ${{ secrets.POLYGON_PLAN != '' && secrets.POLYGON_PLAN || 'free' }}
  TF_VAR_clerk_jwks_url: ${{ secrets.ALEX_CLERK_JWKS_URL }}
  TF_VAR_clerk_issuer: ${{ secrets.ALEX_CLERK_ISSUER }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Alex ai Agents
    runs-on: ubuntu-latest
    env:
      TF_VAR_reuse_existing_agent_infrastructure: ${{ inputs.reuse_existing_agent_infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.ALEX_AWS_REGION }}

      - name: Enable Docker BuildKit (Lambda packaging)
        run: echo "DOCKER_BUILDKIT=1" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Print AWS identity
        run: aws sts get-caller-identity

      - name: Sync backend workspace
        working-directory: backend
        run: uv sync

      - name: Debug commit and database main.tf snippet
        run: |
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "GITHUB_REF=${GITHUB_REF}"
          sed -n '55,80p' terraform/5_database/main.tf

      # Step 1: Deploy the database infrastructure
      - name: Deploy database infrastructure
        working-directory: terraform/5_database
        run: |
          set -euo pipefail
          # aws_region is required in this module; pass it explicitly on import/apply so the
          # provider cannot fall back to a different region than TF_VAR_aws_region (a common cause
          # of "import not found" + apply hitting DBClusterAlreadyExistsFault).
          if [ -z "${TF_VAR_aws_region:-}" ]; then
            echo "::error::TF_VAR_aws_region is empty. Set GitHub secret ALEX_AWS_REGION to your RDS region."
            exit 1
          fi
          export AWS_DEFAULT_REGION="${TF_VAR_aws_region}"
          export AWS_REGION="${TF_VAR_aws_region}"
          echo "Using AWS region for CLI + Terraform provider: ${AWS_REGION}"
          IMPORT_VARS=(-var="aws_region=${TF_VAR_aws_region}")

          terraform init -input=false
          # Local state is not persisted in CI. Terraform never "skips" creates by name — it only
          # knows what is in state. If a resource exists in AWS but not state, we must import it
          # or apply will try to create and fail with AlreadyExists.

          # Try import when not already in state. Do not gate on `aws describe` (Describe* may be
          # denied while Create* is allowed, or region may not match TF_VAR).
          try_import_if_absent() {
            local addr="$1"
            local aws_id="$2"

            if terraform state show "$addr" >/dev/null 2>&1; then
              echo "$addr already in Terraform state; skip import."
              return 0
            fi
            local out
            set +e
            out="$(terraform import -input=false "${IMPORT_VARS[@]}" "$addr" "$aws_id" 2>&1)"
            local ec=$?
            set -e
            if [ "$ec" -eq 0 ]; then
              echo "$out"
              if ! terraform state show "$addr" >/dev/null 2>&1; then
                echo "::error::terraform import reported success but $addr is not in state afterward (wrong id/region or provider issue)."
                exit 1
              fi
              return 0
            fi
            if [[ "$out" == *"Cannot import non-existent remote object"* ]] \
              || [[ "$out" == *"DBClusterNotFoundFault"* ]] \
              || [[ "$out" == *"DBInstanceNotFound"* ]] \
              || [[ "$out" == *"DBSubnetGroupNotFoundFault"* ]] \
              || [[ "$out" == *"NoSuchEntity"* ]] \
              || [[ "$out" == *"Subnet group not found"* ]]; then
              echo "$out"
              echo "Import skipped ($addr not found remotely); Terraform apply will create it if needed."
              return 0
            fi
            if [[ "$out" == *"Resource already managed by Terraform"* ]] || [[ "$out" == *"already in state"* ]]; then
              echo "$addr already tracked; continuing."
              return 0
            fi
            echo "$out"
            return "$ec"
          }

          try_import_if_absent aws_db_subnet_group.aurora alex-aurora-subnet-group
          try_import_if_absent aws_iam_role.lambda_aurora_role alex-lambda-aurora-role

          # Cluster before instance (instance references cluster).
          try_import_if_absent aws_rds_cluster.aurora alex-aurora-cluster
          try_import_if_absent aws_rds_cluster_instance.aurora alex-aurora-instance-1

          echo "Current Terraform state entries:"
          terraform state list || true

          terraform apply -auto-approve "${IMPORT_VARS[@]}"

      # Step 2: Build agent zip packages needed by terraform/6_agents
      - name: Package agent Lambdas for terraform (6_agents)
        working-directory: backend
        run: |
          # terraform/6_agents uploads local zip files to S3; ensure they exist first.
          # Do NOT call deploy_all_lambdas.py here: even with --package it also runs Terraform.
          unset VIRTUAL_ENV
          for agent in planner tagger reporter charter retirement; do
            echo "Packaging ${agent}..."
            (cd "$agent" && uv run package_docker.py)
          done

      # Step 3: Deploy the 6_agents infrastructure
      - name: Terraform init (6_agents)
        working-directory: terraform/6_agents
        run: terraform init -input=false

      - name: Import existing resources (if necessary)
        working-directory: terraform/6_agents
        run: |
          set -euo pipefail
          if [ -z "${TF_VAR_aws_region:-}" ]; then
            echo "::error::TF_VAR_aws_region is empty. Set GitHub secret ALEX_AWS_REGION."
            exit 1
          fi
          export AWS_DEFAULT_REGION="${TF_VAR_aws_region}"
          export AWS_REGION="${TF_VAR_aws_region}"
          TFVARS=(-var="aws_region=${TF_VAR_aws_region}")

          import_if_missing() {
            local addr="$1"
            local import_id="$2"
            if terraform state show "$addr" >/dev/null 2>&1; then
              echo "$addr already in Terraform state; skip import."
              return 0
            fi
            set +e
            out="$(terraform import -input=false "${TFVARS[@]}" "$addr" "$import_id" 2>&1)"
            ec=$?
            set -e
            if [ "$ec" -eq 0 ]; then
              echo "$out"
              return 0
            fi
            if [[ "$out" == *"Cannot import non-existent remote object"* ]] \
              || [[ "$out" == *"ResourceNotFoundException"* ]] \
              || [[ "$out" == *"NonExistentQueue"* ]] \
              || [[ "$out" == *"NoSuchEntity"* ]]; then
              echo "$out"
              echo "Import skipped ($addr not found remotely)."
              return 0
            fi
            if [[ "$out" == *"Resource already managed by Terraform"* ]] || [[ "$out" == *"already in state"* ]]; then
              echo "$addr already tracked; continuing."
              return 0
            fi
            echo "$out"
            return "$ec"
          }

          # Import existing queues by URL (if they already exist).
          DLQ_URL="$(aws sqs get-queue-url --queue-name alex-analysis-jobs-dlq --query QueueUrl --output text 2>/dev/null || true)"
          if [ -n "${DLQ_URL}" ]; then
            import_if_missing aws_sqs_queue.analysis_jobs_dlq "${DLQ_URL}"
          fi

          MAIN_URL="$(aws sqs get-queue-url --queue-name alex-analysis-jobs --query QueueUrl --output text 2>/dev/null || true)"
          if [ -n "${MAIN_URL}" ]; then
            import_if_missing aws_sqs_queue.analysis_jobs "${MAIN_URL}"
          fi

          # Import existing Lambda functions to avoid CreateFunction 409 conflicts.
          for fn in planner tagger reporter charter retirement; do
            if aws lambda get-function --function-name "alex-${fn}" >/dev/null 2>&1; then
              import_if_missing "aws_lambda_function.${fn}" "alex-${fn}"
            fi
          done

          # Import planner event source mapping if already present.
          PLANNER_UUID="$(aws lambda list-event-source-mappings --function-name alex-planner --event-source-arn "$(aws sqs get-queue-attributes --queue-url "${MAIN_URL}" --attribute-names QueueArn --query 'Attributes.QueueArn' --output text 2>/dev/null || true)" --query 'EventSourceMappings[0].UUID' --output text 2>/dev/null || true)"
          if [ -n "${PLANNER_UUID}" ] && [ "${PLANNER_UUID}" != "None" ]; then
            import_if_missing aws_lambda_event_source_mapping.planner_sqs "${PLANNER_UUID}"
          fi

      - name: Terraform apply (6_agents)
        working-directory: terraform/6_agents
        run: terraform apply -auto-approve -var="aws_region=${TF_VAR_aws_region}"

      - name: Sync backend API project (package_docker for API Lambda)
        working-directory: backend/api
        run: uv sync

      - name: Write frontend
        working-directory: frontend
        env:
          PK: ${{ secrets.ALEX_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          SK: ${{ secrets.ALEX_CLERK_SECRET_KEY }}
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${PK}
          CLERK_SECRET_KEY=${SK}
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
          EOF

      - name: Import existing resources (7_frontend)
        working-directory: terraform/7_frontend
        run: |
          set -euo pipefail
          if [ -z "${TF_VAR_aws_region:-}" ]; then
            echo "::error::TF_VAR_aws_region is empty. Set GitHub secret ALEX_AWS_REGION."
            exit 1
          fi
          export AWS_DEFAULT_REGION="${TF_VAR_aws_region}"
          export AWS_REGION="${TF_VAR_aws_region}"
          TFVARS=(-var="aws_region=${TF_VAR_aws_region}")

          terraform init -input=false

          import_if_missing() {
            local addr="$1"
            local import_id="$2"
            if terraform state show "$addr" >/dev/null 2>&1; then
              echo "$addr already in Terraform state; skip import."
              return 0
            fi
            set +e
            out="$(terraform import -input=false "${TFVARS[@]}" "$addr" "$import_id" 2>&1)"
            ec=$?
            set -e
            if [ "$ec" -eq 0 ]; then
              echo "$out"
              return 0
            fi
            if [[ "$out" == *"Cannot import non-existent remote object"* ]] \
              || [[ "$out" == *"NoSuchEntity"* ]] \
              || [[ "$out" == *"ResourceNotFoundException"* ]]; then
              echo "$out"
              echo "Import skipped ($addr not found remotely)."
              return 0
            fi
            if [[ "$out" == *"Resource already managed by Terraform"* ]] || [[ "$out" == *"already in state"* ]]; then
              echo "$addr already tracked; continuing."
              return 0
            fi
            echo "$out"
            return "$ec"
          }

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          FRONTEND_BUCKET="alex-frontend-${ACCOUNT_ID}"

          if aws s3api head-bucket --bucket "${FRONTEND_BUCKET}" >/dev/null 2>&1; then
            import_if_missing aws_s3_bucket.frontend "${FRONTEND_BUCKET}"
          fi

          if aws iam get-role --role-name alex-api-lambda-role >/dev/null 2>&1; then
            import_if_missing aws_iam_role.api_lambda_role alex-api-lambda-role
          fi

          if aws lambda get-function --function-name alex-api >/dev/null 2>&1; then
            import_if_missing aws_lambda_function.api alex-api
            # Avoid AddPermission 409 when statement already exists on the function.
            import_if_missing aws_lambda_permission.api_gw alex-api/AllowExecutionFromAPIGateway
          fi

          # Reuse an existing HTTP API to avoid creating duplicate alex-api-gateway APIs in CI.
          API_ID="$(aws apigatewayv2 get-apis --query "reverse(sort_by(Items[?Name=='alex-api-gateway' && ProtocolType=='HTTP'], &CreatedDate))[0].ApiId" --output text 2>/dev/null || true)"
          if [ -n "${API_ID}" ] && [ "${API_ID}" != "None" ]; then
            import_if_missing aws_apigatewayv2_api.main "${API_ID}"

            DEFAULT_STAGE="$(aws apigatewayv2 get-stages --api-id "${API_ID}" --query "Items[?StageName=='\$default'].StageName | [0]" --output text 2>/dev/null || true)"
            if [ -n "${DEFAULT_STAGE}" ] && [ "${DEFAULT_STAGE}" != "None" ]; then
              import_if_missing aws_apigatewayv2_stage.default "${API_ID}/\$default"
            fi

            INTEGRATION_ID="$(aws apigatewayv2 get-integrations --api-id "${API_ID}" --query "Items[?IntegrationType=='AWS_PROXY'].IntegrationId | [0]" --output text 2>/dev/null || true)"
            if [ -n "${INTEGRATION_ID}" ] && [ "${INTEGRATION_ID}" != "None" ]; then
              import_if_missing aws_apigatewayv2_integration.lambda "${API_ID}/${INTEGRATION_ID}"
            fi

            ROUTE_ANY_ID="$(aws apigatewayv2 get-routes --api-id "${API_ID}" --query "Items[?RouteKey=='ANY /api/{proxy+}'].RouteId | [0]" --output text 2>/dev/null || true)"
            if [ -n "${ROUTE_ANY_ID}" ] && [ "${ROUTE_ANY_ID}" != "None" ]; then
              import_if_missing aws_apigatewayv2_route.api_any "${API_ID}/${ROUTE_ANY_ID}"
            fi

            ROUTE_OPTIONS_ID="$(aws apigatewayv2 get-routes --api-id "${API_ID}" --query "Items[?RouteKey=='OPTIONS /api/{proxy+}'].RouteId | [0]" --output text 2>/dev/null || true)"
            if [ -n "${ROUTE_OPTIONS_ID}" ] && [ "${ROUTE_OPTIONS_ID}" != "None" ]; then
              import_if_missing aws_apigatewayv2_route.api_options "${API_ID}/${ROUTE_OPTIONS_ID}"
            fi
          fi

      - name: Run full deployment
        working-directory: scripts
        run: uv run deploy.py
