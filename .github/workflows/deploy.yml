# One workflow: Part 6 agent Lambdas (OpenRouter) then Part 7 API Lambda + Next.js + S3 + CloudFront.
#
# GitHub → Settings → Secrets and variables → Actions → Repository secrets
# (nothing is inferred automatically; each TF_VAR_* below must have a matching secret or the value is empty).
#
#   AWS_ROLE_ARN, ALEX_AWS_REGION
#     OIDC + region (same idea as saas/saas, but Alex uses ALEX_AWS_REGION as the secret name).
#   ALEX_AURORA_CLUSTER_ARN, ALEX_AURORA_SECRET_ARN, ALEX_VECTOR_BUCKET
#     Required for Terraform in terraform/6_agents (same values as local terraform.tfvars from Parts 3 & 5).
#     Legacy names also accepted: AURORA_SECRET_ARN, VECTOR_BUCKET (if ALEX_* is unset).
#   POLYGON_PLAN (optional) — "free" or "paid"; defaults to free if unset.
#   OPENROUTER_API_KEY, ALEX_POLYGON_API_KEY
#     Agent Lambdas / market data.
#   ALEX_CLERK_JWKS_URL, ALEX_CLERK_ISSUER
#     Part 7 API Lambda env.
#   ALEX_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY, ALEX_CLERK_SECRET_KEY
#     Frontend .env.production at build time.
#
name: Deploy backend + frontend

on:
  workflow_dispatch:
    inputs:
      package_agents:
        description: "Docker-package all five agent Lambdas before terraform apply"
        required: true
        type: boolean
        default: true
      reuse_existing_agent_infra:
        description: "Reuse IAM role."
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

env:
  CI: true
  TF_VAR_aws_region: ${{ secrets.ALEX_AWS_REGION }}
  TF_VAR_aurora_cluster_arn: ${{ secrets.ALEX_AURORA_CLUSTER_ARN }}
  TF_VAR_aurora_secret_arn: ${{ secrets.ALEX_AURORA_SECRET_ARN != '' && secrets.ALEX_AURORA_SECRET_ARN || secrets.AURORA_SECRET_ARN }}
  TF_VAR_vector_bucket: ${{ secrets.ALEX_VECTOR_BUCKET != '' && secrets.ALEX_VECTOR_BUCKET || secrets.VECTOR_BUCKET }}
  TF_VAR_openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
  TF_VAR_polygon_api_key: ${{ secrets.ALEX_POLYGON_API_KEY }}
  TF_VAR_polygon_plan: ${{ secrets.POLYGON_PLAN != '' && secrets.POLYGON_PLAN || 'free' }}
  TF_VAR_clerk_jwks_url: ${{ secrets.ALEX_CLERK_JWKS_URL }}
  TF_VAR_clerk_issuer: ${{ secrets.ALEX_CLERK_ISSUER }}

defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: Alex ai Agents
    runs-on: ubuntu-latest
    env:
      TF_VAR_reuse_existing_agent_infrastructure: ${{ inputs.reuse_existing_agent_infra }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.ALEX_AWS_REGION }}

      - name: Enable Docker BuildKit (Lambda packaging)
        run: echo "DOCKER_BUILDKIT=1" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Print AWS identity
        run: aws sts get-caller-identity

      - name: Sync backend workspace
        working-directory: backend
        run: uv sync

      - name: Terraform init
        working-directory: terraform/6_agents
        run: terraform init -input=false

      - name: Package (optional) and deploy agent Lambdas
        working-directory: backend
        run: |
          # Avoid inheriting backend/.venv as VIRTUAL_ENV when each agent uses its own .venv
          unset VIRTUAL_ENV
          if [ "${{ inputs.package_agents }}" = "true" ]; then
            uv run deploy_all_lambdas.py --package
          else
            uv run deploy_all_lambdas.py
          fi

      - name: Sync backend API project (package_docker for API Lambda)
        working-directory: backend/api
        run: uv sync

      - name: Write frontend
        working-directory: frontend
        env:
          PK: ${{ secrets.ALEX_NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          SK: ${{ secrets.ALEX_CLERK_SECRET_KEY }}
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${PK}
          CLERK_SECRET_KEY=${SK}
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=/dashboard
          NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=/dashboard
          EOF

      - name: Run full deployment
        working-directory: scripts
        run: uv run deploy.py
